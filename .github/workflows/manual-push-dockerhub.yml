name: manually push to dockerhub
on:
  workflow_dispatch:
    inputs:
      version:
        description: "The release version tag to build and push (e.g., 1.2.3)"
        required: true
        type: string
      target_to_build:
        description: "The specific target to build (e.g., base, sdxl, sd3, flux1-schnell, flux1-dev)"
        required: true
        type: string
jobs:
  manual_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Clear space to remove unused folders
        run: |
          rm -rf /usr/share/dotnet
          rm -rf /opt/ghc
          rm -rf "/usr/local/share/boost"
          rm -rf "$AGENT_TOOLSDIRECTORY"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push the images to Docker Hub
        uses: docker/bake-action@v5
        with:
          push: true
          targets: ${{ github.event.inputs.target_to_build }}
          set: |
            *.args.DOCKERHUB_REPO=${{ secrets.DOCKERHUB_USERNAME }}
            *.args.DOCKERHUB_IMG=worker-comfyui
            *.args.RELEASE_VERSION=${{ github.event.inputs.version }}
